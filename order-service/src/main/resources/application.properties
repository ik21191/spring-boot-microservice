spring.application.name=order-service
server.port=3002

#Logger
server.tomcat.basedir=../../temp/logs/order-service
server.tomcat.accesslog.enabled=true
server.tomcat.accesslog.pattern=%t %a "%r" %s (%D ms)

logging.file.name=../../temp/logs/order-service.log
logging.level.org.apache.tomcat=INFO
logging.level.org.apache.catalina=INFO

logging.level.root=INFO

#Migration
#eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.client.serviceUrl.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

# Spring Security : Overriding default username and password
spring.security.user.name=test
spring.security.user.password=test
spring.security.user.roles=USER

#logging.level.root=DEBUG

#Kubernetes
eureka.instance.preferIpAddress=true