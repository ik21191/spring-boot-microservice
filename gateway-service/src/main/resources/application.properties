spring.application.name=gateway-service

#tomcat
server.port=8080

#Logger
server.tomcat.basedir=../../temp/logs/discovery-service
server.tomcat.accesslog.enabled=true
server.tomcat.accesslog.pattern=%t %a "%r" %s (%D ms)

logging.file.name=../../temp/logs/gateway-service.log
logging.level.org.apache.tomcat=INFO
logging.level.org.apache.catalina=INFO

logging.level.root=${LOGGING_LEVEL_ROOT:DEBUG}

#To print IPV4 ip address instead of IPV6 #Not working in this project
server.tomcat.system-properties.java.net.preferIPv4Stack=true

#eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.client.serviceUrl.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
